<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Contabilidad Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos personalizados para las Cuentas T (Esquema de Mayor) */
        .t-account {
            border-top: 3px solid #1e293b; /* slate-800 */
        }
        .t-divider {
            border-left: 3px solid #1e293b;
        }
        .amount-col {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        /* Custom scrollbar para tablas */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 h-screen flex overflow-hidden">

    <!-- Sidebar Navegación -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col transition-all duration-300 z-20 shadow-xl hidden md:flex">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-2xl font-bold tracking-wider flex items-center gap-3">
                <i class="fa-solid fa-calculator text-blue-400"></i> ContaWeb
            </h1>
            <p class="text-xs text-slate-400 mt-2">Sistema Automatizado</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="app.navigate('catalogo')" id="nav-catalogo" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left hover:bg-slate-800 transition-colors">
                <i class="fa-solid fa-list w-5 text-center"></i> Catálogo de Cuentas
            </button>
            <button onclick="app.navigate('diario')" id="nav-diario" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left bg-blue-600 text-white transition-colors">
                <i class="fa-solid fa-book-journal-whills w-5 text-center"></i> Libro Diario
            </button>
            <button onclick="app.navigate('mayor')" id="nav-mayor" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left hover:bg-slate-800 transition-colors">
                <i class="fa-solid fa-t w-5 text-center"></i> Esquema de Mayor
            </button>
            <button onclick="app.navigate('balanza')" id="nav-balanza" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left hover:bg-slate-800 transition-colors">
                <i class="fa-solid fa-scale-balanced w-5 text-center"></i> Balanza de Comprobación
            </button>
            <button onclick="app.navigate('estados')" id="nav-estados" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left hover:bg-slate-800 transition-colors">
                <i class="fa-solid fa-chart-pie w-5 text-center"></i> Estados Financieros
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800 text-xs text-center text-slate-500">
            &copy; 2026 ContaWeb App
        </div>
    </aside>

    <!-- Mobile Nav (Hamburger) -->
    <div class="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center absolute w-full z-30 shadow-md">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-calculator text-blue-400"></i> ContaWeb</h1>
        <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="text-2xl"><i class="fa-solid fa-bars"></i></button>
    </div>
    <div id="mobile-menu" class="hidden md:hidden absolute top-16 left-0 w-full bg-slate-900 z-20 shadow-xl flex flex-col p-2">
         <button onclick="app.navigate('catalogo'); document.getElementById('mobile-menu').classList.add('hidden')" class="p-3 text-left text-white border-b border-slate-800">Catálogo</button>
         <button onclick="app.navigate('diario'); document.getElementById('mobile-menu').classList.add('hidden')" class="p-3 text-left text-white border-b border-slate-800">Libro Diario</button>
         <button onclick="app.navigate('mayor'); document.getElementById('mobile-menu').classList.add('hidden')" class="p-3 text-left text-white border-b border-slate-800">Mayor</button>
         <button onclick="app.navigate('balanza'); document.getElementById('mobile-menu').classList.add('hidden')" class="p-3 text-left text-white border-b border-slate-800">Balanza</button>
         <button onclick="app.navigate('estados'); document.getElementById('mobile-menu').classList.add('hidden')" class="p-3 text-left text-white">Estados Financieros</button>
    </div>

    <!-- Contenido Principal -->
    <main class="flex-1 flex flex-col h-full overflow-hidden w-full pt-16 md:pt-0">
        <!-- Header View -->
        <header class="bg-white shadow-sm px-8 py-5 flex-shrink-0 flex justify-between items-center">
            <div>
                <h2 id="view-title" class="text-2xl font-semibold text-slate-800">Libro Diario</h2>
                <p id="view-subtitle" class="text-sm text-slate-500">Registro cronológico de operaciones</p>
            </div>
            <button onclick="app.exportCurrentView()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition-colors text-sm flex items-center gap-2 shadow-sm" title="Exportar pestaña actual">
                <i class="fa-solid fa-file-excel"></i> Exportar a Excel (XML)
            </button>
        </header>

        <!-- Area de Renderizado -->
        <div id="app-content" class="flex-1 overflow-y-auto p-4 md:p-8">
            <!-- El contenido se inyecta por JS -->
        </div>
    </main>

    <!-- Sistema de Notificaciones (Toasts) -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3"></div>

    <script>
        // --- 1. ESTADO GLOBAL DE LA APLICACIÓN ---
        const state = {
            view: 'diario',
            // Catálogo base para que el usuario no empiece desde cero
            accounts: [
                { id: '1001', name: 'Caja', type: 'Activo' },
                { id: '1002', name: 'Bancos', type: 'Activo' },
                { id: '1003', name: 'Almacén / Inventario', type: 'Activo' },
                { id: '1004', name: 'Clientes', type: 'Activo' },
                { id: '1005', name: 'Mobiliario y Equipo', type: 'Activo' },
                { id: '2001', name: 'Proveedores', type: 'Pasivo' },
                { id: '2002', name: 'Acreedores Diversos', type: 'Pasivo' },
                { id: '2003', name: 'Documentos por Pagar', type: 'Pasivo' },
                { id: '3001', name: 'Capital Social', type: 'Capital' },
                { id: '4001', name: 'Ventas', type: 'Ingreso' },
                { id: '5001', name: 'Costo de Ventas', type: 'Gasto' },
                { id: '5002', name: 'Gastos de Venta', type: 'Gasto' },
                { id: '5003', name: 'Gastos de Administración', type: 'Gasto' }
            ],
            // Asientos contables
            journal: [
                {
                    id: 1,
                    date: new Date().toISOString().split('T')[0],
                    concept: 'Asiento de Apertura',
                    lines: [
                        { accountId: '1002', debe: 150000, haber: 0 },
                        { accountId: '1003', debe: 80000, haber: 0 },
                        { accountId: '1005', debe: 20000, haber: 0 },
                        { accountId: '3001', debe: 0, haber: 250000 }
                    ]
                }
            ],
            // Estado temporal para el asiento en redacción
            draftEntry: {
                date: new Date().toISOString().split('T')[0],
                concept: '',
                lines: []
            }
        };

        // --- 2. UTILIDADES ---
        const formatMoney = (amount) => {
            return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(amount);
        };

        const showToast = (message, type = 'info') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500';
            const icon = type === 'error' ? 'fa-circle-exclamation' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
            
            toast.className = `${bg} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            });

            // Animate out and remove
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        };

        // --- 2.5 UTILIDADES DE EXPORTACIÓN A EXCEL (XML Spreadsheet 2003) ---
        const generateExcelXML = (worksheets) => {
            let xml = '<?xml version="1.0"?>\n';
            xml += '<?mso-application progid="Excel.Sheet"?>\n';
            xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';
            
            worksheets.forEach(ws => {
                xml += `  <Worksheet ss:Name="${ws.name}">\n    <Table>\n`;
                ws.rows.forEach(row => {
                    xml += `      <Row>\n`;
                    row.forEach(cell => {
                        const type = typeof cell === 'number' ? 'Number' : 'String';
                        const val = cell !== null && cell !== undefined ? String(cell).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
                        xml += `        <Cell><Data ss:Type="${type}">${val}</Data></Cell>\n`;
                    });
                    xml += `      </Row>\n`;
                });
                xml += `    </Table>\n  </Worksheet>\n`;
            });
            
            xml += '</Workbook>';
            return xml;
        };

        const downloadXML = (xmlString, filename) => {
            const blob = new Blob([xmlString], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // --- 3. MOTOR CONTABLE (Lógica Central) ---
        const calculateLedger = () => {
            const ledger = {};
            
            // Inicializar todas las cuentas
            state.accounts.forEach(acc => {
                ledger[acc.id] = { 
                    ...acc, 
                    sumDebe: 0, 
                    sumHaber: 0, 
                    saldoDeudor: 0, 
                    saldoAcreedor: 0, 
                    saldoNeto: 0,
                    movements: [] 
                };
            });

            // Procesar diario
            state.journal.forEach(entry => {
                entry.lines.forEach(line => {
                    const acc = ledger[line.accountId];
                    if (acc) {
                        acc.sumDebe += line.debe;
                        acc.sumHaber += line.haber;
                        acc.movements.push({
                            entryId: entry.id,
                            debe: line.debe,
                            haber: line.haber
                        });
                    }
                });
            });

            // Calcular saldos (Naturaleza Deudora: Activo, Gasto. Naturaleza Acreedora: Pasivo, Capital, Ingreso)
            Object.values(ledger).forEach(acc => {
                const diff = acc.sumDebe - acc.sumHaber;
                if (acc.type === 'Activo' || acc.type === 'Gasto') {
                    // Naturaleza Deudora
                    if (diff > 0) acc.saldoDeudor = diff;
                    else if (diff < 0) acc.saldoAcreedor = Math.abs(diff); // Cuenta sobregirada
                    acc.saldoNeto = diff;
                } else {
                    // Naturaleza Acreedora
                    if (diff < 0) acc.saldoAcreedor = Math.abs(diff);
                    else if (diff > 0) acc.saldoDeudor = diff; // Cuenta irregular
                    acc.saldoNeto = -diff; // Positivo significa saldo normal (acreedor)
                }
            });

            return ledger;
        };

        // --- 4. RENDERIZADO DE VISTAS ---
        const contentDiv = document.getElementById('app-content');

        const views = {
            catalogo: {
                title: 'Catálogo de Cuentas',
                subtitle: 'Administración de la estructura contable',
                render: () => {
                    let rows = state.accounts.map(acc => `
                        <tr class="border-b hover:bg-slate-50 transition-colors">
                            <td class="px-4 py-3 font-medium text-slate-700">${acc.id}</td>
                            <td class="px-4 py-3">${acc.name}</td>
                            <td class="px-4 py-3">
                                <span class="px-2 py-1 rounded text-xs font-semibold 
                                    ${acc.type === 'Activo' ? 'bg-blue-100 text-blue-800' : 
                                      acc.type === 'Pasivo' ? 'bg-red-100 text-red-800' :
                                      acc.type === 'Capital' ? 'bg-purple-100 text-purple-800' :
                                      acc.type === 'Ingreso' ? 'bg-green-100 text-green-800' : 'bg-orange-100 text-orange-800'}">
                                    ${acc.type}
                                </span>
                            </td>
                        </tr>
                    `).join('');

                    return `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                            <div class="p-6 bg-slate-50 border-b border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                                <h3 class="font-semibold text-lg"><i class="fa-solid fa-plus-circle text-blue-600 mr-2"></i>Nueva Cuenta</h3>
                                <div class="flex w-full md:w-auto gap-2">
                                    <input type="text" id="new-acc-id" placeholder="Cód." class="w-20 px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <input type="text" id="new-acc-name" placeholder="Nombre de la cuenta" class="flex-1 md:w-64 px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <select id="new-acc-type" class="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="Activo">Activo</option>
                                        <option value="Pasivo">Pasivo</option>
                                        <option value="Capital">Capital</option>
                                        <option value="Ingreso">Ingreso</option>
                                        <option value="Gasto">Gasto</option>
                                    </select>
                                    <button onclick="app.addAccount()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors text-sm">
                                        Agregar
                                    </button>
                                </div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm whitespace-nowrap">
                                    <thead class="bg-slate-100 text-slate-600 uppercase text-xs font-semibold">
                                        <tr>
                                            <th class="px-4 py-3">Código</th>
                                            <th class="px-4 py-3">Nombre de Cuenta</th>
                                            <th class="px-4 py-3">Naturaleza / Tipo</th>
                                        </tr>
                                    </thead>
                                    <tbody>${rows}</tbody>
                                </table>
                            </div>
                        </div>
                    `;
                }
            },
            diario: {
                title: 'Libro Diario',
                subtitle: 'Registro cronológico de operaciones con partida doble',
                render: () => {
                    // Opciones de cuentas para el select
                    const accOptions = state.accounts.map(a => `<option value="${a.id}">${a.id} - ${a.name}</option>`).join('');
                    
                    // Filas del borrador
                    let draftRows = '';
                    let draftTotalDebe = 0;
                    let draftTotalHaber = 0;
                    
                    state.draftEntry.lines.forEach((line, idx) => {
                        const accName = state.accounts.find(a => a.id === line.accountId)?.name || 'Desconocida';
                        draftTotalDebe += line.debe;
                        draftTotalHaber += line.haber;
                        draftRows += `
                            <tr class="border-b text-sm">
                                <td class="px-3 py-2">${line.accountId} - ${accName}</td>
                                <td class="px-3 py-2 amount-col ${line.debe > 0 ? 'font-medium' : 'text-slate-300'}">${formatMoney(line.debe)}</td>
                                <td class="px-3 py-2 amount-col ${line.haber > 0 ? 'font-medium' : 'text-slate-300'}">${formatMoney(line.haber)}</td>
                                <td class="px-3 py-2 text-center">
                                    <button onclick="app.removeDraftLine(${idx})" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                                </td>
                            </tr>
                        `;
                    });

                    const diff = Math.abs(draftTotalDebe - draftTotalHaber);
                    const isBalanced = draftTotalDebe > 0 && draftTotalDebe === draftTotalHaber;

                    // Asientos históricos
                    let historyHTML = state.journal.slice().reverse().map(entry => {
                        let linesHtml = entry.lines.map(l => {
                            const accName = state.accounts.find(a => a.id === l.accountId)?.name || l.accountId;
                            // Sangría visual para cuentas de abono
                            const paddingClass = l.haber > 0 ? 'pl-8' : '';
                            return `
                                <tr class="text-sm">
                                    <td class="px-4 py-1 ${paddingClass}">${accName}</td>
                                    <td class="px-4 py-1 amount-col">${l.debe > 0 ? formatMoney(l.debe) : ''}</td>
                                    <td class="px-4 py-1 amount-col">${l.haber > 0 ? formatMoney(l.haber) : ''}</td>
                                </tr>
                            `;
                        }).join('');

                        return `
                            <div class="mb-6 bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm">
                                <div class="bg-slate-50 px-4 py-2 border-b flex justify-between items-center text-sm">
                                    <span class="font-bold text-slate-700">Asiento Nº ${entry.id}</span>
                                    <span class="text-slate-500"><i class="fa-regular fa-calendar mr-1"></i> ${entry.date}</span>
                                </div>
                                <table class="w-full">
                                    <thead class="text-xs text-slate-400 border-b">
                                        <tr><th class="text-left px-4 py-1 font-medium">Cuenta</th><th class="text-right px-4 py-1 font-medium w-32">Debe</th><th class="text-right px-4 py-1 font-medium w-32">Haber</th></tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">${linesHtml}</tbody>
                                </table>
                                <div class="px-4 py-2 bg-slate-50 border-t text-sm text-slate-600 italic">
                                    Concepto: ${entry.concept}
                                </div>
                            </div>
                        `;
                    }).join('');

                    return `
                        <!-- Formulario de Nuevo Asiento -->
                        <div class="bg-white rounded-xl shadow-md border border-blue-100 overflow-hidden mb-8">
                            <div class="bg-blue-600 text-white px-6 py-4 flex justify-between items-center">
                                <h3 class="font-bold text-lg"><i class="fa-solid fa-pen-to-square mr-2"></i>Registrar Nuevo Asiento</h3>
                            </div>
                            
                            <div class="p-6">
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Fecha</label>
                                        <input type="date" id="draft-date" value="${state.draftEntry.date}" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                    </div>
                                    <div class="md:col-span-2">
                                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Concepto / Descripción</label>
                                        <input type="text" id="draft-concept" value="${state.draftEntry.concept}" placeholder="Ej. Pago a proveedores s/factura 123" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                    </div>
                                </div>

                                <!-- Entrada rápida de partidas -->
                                <div class="flex flex-col md:flex-row gap-3 mb-4 bg-slate-50 p-4 rounded-lg border border-slate-200">
                                    <div class="flex-1">
                                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Cuenta Contable</label>
                                        <select id="draft-acc" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 bg-white focus:outline-none">
                                            <option value="">-- Seleccionar Cuenta --</option>
                                            ${accOptions}
                                        </select>
                                    </div>
                                    <div class="w-full md:w-32">
                                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Debe (Cargar)</label>
                                        <input type="number" id="draft-debe" min="0" step="0.01" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-right" placeholder="0.00">
                                    </div>
                                    <div class="w-full md:w-32">
                                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Haber (Abonar)</label>
                                        <input type="number" id="draft-haber" min="0" step="0.01" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-right" placeholder="0.00">
                                    </div>
                                    <div class="flex items-end">
                                        <button onclick="app.addDraftLine()" class="w-full md:w-auto bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                                            <i class="fa-solid fa-plus"></i> Agregar
                                        </button>
                                    </div>
                                </div>

                                <!-- Tabla del borrador -->
                                ${state.draftEntry.lines.length > 0 ? `
                                <div class="border rounded-lg overflow-hidden mb-4">
                                    <table class="w-full text-left">
                                        <thead class="bg-slate-100 text-xs text-slate-600 border-b">
                                            <tr>
                                                <th class="px-3 py-2">Cuenta</th>
                                                <th class="px-3 py-2 text-right w-32">Cargos (Debe)</th>
                                                <th class="px-3 py-2 text-right w-32">Abonos (Haber)</th>
                                                <th class="px-3 py-2 text-center w-16">Acción</th>
                                            </tr>
                                        </thead>
                                        <tbody>${draftRows}</tbody>
                                        <tfoot class="bg-slate-50 border-t font-semibold text-sm">
                                            <tr>
                                                <td class="px-3 py-3 text-right text-slate-600 uppercase text-xs tracking-wider">Sumas Iguales:</td>
                                                <td class="px-3 py-3 amount-col ${!isBalanced && draftTotalDebe !== draftTotalHaber ? 'text-red-600' : 'text-green-600'}">${formatMoney(draftTotalDebe)}</td>
                                                <td class="px-3 py-3 amount-col ${!isBalanced && draftTotalDebe !== draftTotalHaber ? 'text-red-600' : 'text-green-600'}">${formatMoney(draftTotalHaber)}</td>
                                                <td></td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                                
                                <div class="flex items-center justify-between">
                                    <div class="text-sm font-medium">
                                        ${!isBalanced ? 
                                            `<span class="text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> El asiento está descuadrado por ${formatMoney(diff)}</span>` : 
                                            `<span class="text-green-600"><i class="fa-solid fa-check-double"></i> Partida doble correcta</span>`}
                                    </div>
                                    <button onclick="app.saveJournalEntry()" class="px-6 py-2 rounded-lg font-bold text-white transition-colors shadow-sm
                                        ${isBalanced ? 'bg-green-600 hover:bg-green-700 cursor-pointer' : 'bg-slate-300 cursor-not-allowed'}" 
                                        ${!isBalanced ? 'disabled' : ''}>
                                        <i class="fa-solid fa-save mr-2"></i> Guardar Asiento
                                    </button>
                                </div>

                                </div>

            estados: {
                title: 'Estados Financieros',
                subtitle: 'Información financiera estructurada',

                    });

                    const resultWord = utilidadDelEjercicio >= 0 ? 'Utilidad Neta' : 'Pérdida Neta';

                    // --- BALANCE GENERAL ---
                    let totalActivo = 0, totalPasivo = 0, totalCapital = 0;
                    let lineasActivo = '', lineasPasivo = '', lineasCapital = '';

                    Object.values(ledger).forEach(acc => {
                        if (acc.type === 'Activo' && acc.saldoNeto > 0) {
                            totalActivo += acc.saldoNeto;
                            lineasActivo += `<div class="flex justify-between py-1 text-sm"><span class="pl-4">${acc.name}</span> <span>${formatMoney(acc.saldoNeto)}</span></div>`;
                        } else if (acc.type === 'Pasivo' && acc.saldoNeto > 0) {
                            totalPasivo += acc.saldoNeto;
                            lineasPasivo += `<div class="flex justify-between py-1 text-sm"><span class="pl-4">${acc.name}</span> <span>${formatMoney(acc.saldoNeto)}</span></div>`;

                            totalCapital += acc.saldoNeto;
                            lineasCapital += `<div class="flex justify-between py-1 text-sm"><span class="pl-4">${acc.name}</span> <span>${formatMoney(acc.saldoNeto)}</span></div>`;
                        }
                    });

                    // Añadir la utilidad al capital para el balance general
                    const sumaPasivoCapital = totalPasivo + totalCapital + utilidadDelEjercicio;
                    const balanceCuadrado = Math.abs(totalActivo - sumaPasivoCapital) < 0.01; // Tolerancia de decimales

                    return `
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                            <!-- ESTADO DE RESULTADOS -->
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <div class="bg-slate-800 text-white p-4 text-center">
                                    <h3 class="font-bold text-lg">Estado de Resultados</h3>
                                    <p class="text-xs text-slate-300">Del periodo actual</p>
                                </div>
                                <div class="p-6">
                                    <h4 class="font-bold text-slate-700 border-b pb-1 mb-2">Ingresos</h4>
                                    ${lineasIngreso || '<div class="text-sm text-slate-400 italic pl-4 pb-2">Sin registros</div>'}
                                    <div class="flex justify-between font-semibold text-sm py-2 mb-4">
                                        <span>Total Ingresos:</span> <span>${formatMoney(ingresos)}</span>
                                    </div>

                                    <h4 class="font-bold text-slate-700 border-b pb-1 mb-2 mt-4">Menos: Gastos</h4>
                                    ${lineasGasto || '<div class="text-sm text-slate-400 italic pl-4 pb-2">Sin registros</div>'}
                                    <div class="flex justify-between font-semibold text-sm py-2 mb-4 border-b">
                                        <span>Total Gastos:</span> <span>${formatMoney(gastos)}</span>
                                    </div>

                                    <div class="flex justify-between font-bold text-lg py-3 mt-4 ${utilidadDelEjercicio >= 0 ? 'text-green-700 bg-green-50' : 'text-red-700 bg-red-50'} px-4 rounded">
                                        <span>${resultWord} del Ejercicio:</span> <span>${formatMoney(utilidadDelEjercicio)}</span>
                                    </div>
                                </div>
                            </div>

                            <!-- BALANCE GENERAL -->
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <div class="bg-slate-800 text-white p-4 text-center">
                                    <h3 class="font-bold text-lg">Balance General</h3>
                                    <p class="text-xs text-slate-300">Al día de hoy</p>
                                </div>
                                <div class="p-6">
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <!-- Activos -->
                                        <div>
                                            <h4 class="font-bold text-blue-800 border-b-2 border-blue-800 pb-1 mb-2">ACTIVO</h4>
                                            ${lineasActivo || '<div class="text-sm text-slate-400 italic pl-4">Sin registros</div>'}
                                            <div class="flex justify-between font-bold text-sm py-2 mt-4 border-t border-slate-300">
                                                <span>Total Activo:</span> <span>${formatMoney(totalActivo)}</span>
                                            </div>
                                        </div>

                                        <!-- Pasivo y Capital -->
                                        <div>
                                            <h4 class="font-bold text-red-800 border-b-2 border-red-800 pb-1 mb-2">PASIVO</h4>
                                            ${lineasPasivo || '<div class="text-sm text-slate-400 italic pl-4">Sin registros</div>'}
                                            <div class="flex justify-between font-bold text-sm py-2 mt-2 border-t border-slate-300">
                                                <span>Total Pasivo:</span> <span>${formatMoney(totalPasivo)}</span>
                                            </div>

                                            <h4 class="font-bold text-purple-800 border-b-2 border-purple-800 pb-1 mb-2 mt-6">CAPITAL CONTABLE</h4>
                                            ${lineasCapital || '<div class="text-sm text-slate-400 italic pl-4">Sin registros</div>'}
                                            <div class="flex justify-between py-1 text-sm text-slate-600">
                                                <span class="pl-4">${resultWord}</span> <span>${formatMoney(utilidadDelEjercicio)}</span>
                                            </div>
                                            <div class="flex justify-between font-bold text-sm py-2 mt-2 border-t border-slate-300">
                                                <span>Total Capital:</span> <span>${formatMoney(totalCapital + utilidadDelEjercicio)}</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- Ecuación contable final -->
                                    <div class="mt-8 border-t-4 border-slate-800 pt-4 flex justify-between items-center bg-slate-50 p-4 rounded-lg">
                                        <div class="text-sm font-bold text-slate-600 uppercase">Suma Pasivo + Capital:</div>
                                        <div class="text-xl font-bold ${balanceCuadrado ? 'text-slate-800' : 'text-red-600'}">
                                            ${formatMoney(sumaPasivoCapital)}
                                        </div>
                                    </div>
                                    ${!balanceCuadrado ? `
                                        <div class="text-xs text-red-500 mt-2 text-center font-bold">
                                            <i class="fa-solid fa-xmark"></i> El balance no cuadra. Activo (${formatMoney(totalActivo)}) ≠ Pasivo+Capital.
                                        </div>
                                    ` : `
                                        <div class="text-xs text-green-600 mt-2 text-center font-bold">
                                            <i class="fa-solid fa-check"></i> Balance General cuadrado (Activo = Pasivo + Capital)
                                        </div>
                                    `}
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
        };

        // --- 5. CONTROLADOR DE LA APP (Acciones) ---
        window.app = {
            // Función de exportación dinámica por pestaña
            exportCurrentView: () => {
                const viewName = state.view;
                let worksheets = [];
                let filename = '';

                if (viewName === 'catalogo') {
                    filename = 'Catalogo_Cuentas.xml';
                    const rows = [['Código', 'Nombre de Cuenta', 'Naturaleza / Tipo']];
                    state.accounts.forEach(acc => rows.push([acc.id, acc.name, acc.type]));
                    worksheets.push({ name: 'Catálogo', rows });
                }
                else if (viewName === 'diario') {
                    filename = 'Libro_Diario.xml';
                    const rows = [['Nº Asiento', 'Fecha', 'Concepto', 'Código Cuenta', 'Nombre Cuenta', 'Debe', 'Haber']];
                    state.journal.forEach(entry => {
                        entry.lines.forEach(line => {
                            const accName = state.accounts.find(a => a.id === line.accountId)?.name || line.accountId;
                            rows.push([entry.id, entry.date, entry.concept, line.accountId, accName, line.debe, line.haber]);
                        });
                    });
                    worksheets.push({ name: 'Diario', rows });
                }
                else if (viewName === 'mayor') {
                    filename = 'Esquema_Mayor.xml';
                    const rows = [['Código', 'Cuenta', 'Suma Debe', 'Suma Haber', 'Saldo Deudor', 'Saldo Acreedor']];
                    const ledger = calculateLedger();
                    Object.values(ledger).forEach(acc => {
                        if (acc.sumDebe > 0 || acc.sumHaber > 0 || acc.saldoDeudor > 0 || acc.saldoAcreedor > 0) {
                            rows.push([acc.id, acc.name, acc.sumDebe, acc.sumHaber, acc.saldoDeudor, acc.saldoAcreedor]);
                        }
                    });
                    worksheets.push({ name: 'Mayor', rows });
                }
                else if (viewName === 'balanza') {
                    filename = 'Balanza_Comprobacion.xml';
                    const rows = [['Código', 'Cuenta', 'Movimiento Debe', 'Movimiento Haber', 'Saldo Deudor', 'Saldo Acreedor']];
                    const ledger = calculateLedger();
                    let [sumMD, sumMH, sumSD, sumSA] = [0,0,0,0];
                    Object.values(ledger).forEach(acc => {
                        if (acc.sumDebe > 0 || acc.sumHaber > 0) {
                            rows.push([acc.id, acc.name, acc.sumDebe, acc.sumHaber, acc.saldoDeudor, acc.saldoAcreedor]);
                            sumMD += acc.sumDebe; sumMH += acc.sumHaber; sumSD += acc.saldoDeudor; sumSA += acc.saldoAcreedor;
                        }
                    });
                    rows.push(['TOTALES', '', sumMD, sumMH, sumSD, sumSA]);
                    worksheets.push({ name: 'Balanza', rows });
                }
                else if (viewName === 'estados') {
                    filename = 'Estados_Financieros.xml';
                    const ledger = calculateLedger();
                    
                    // Estado de Resultados
                    const erRows = [['ESTADO DE RESULTADOS', ''], ['Concepto', 'Monto']];
                    let ing = 0, gas = 0;
                    erRows.push(['INGRESOS', '']);
                    Object.values(ledger).forEach(a => { if(a.type === 'Ingreso' && a.saldoNeto > 0) { erRows.push([a.name, a.saldoNeto]); ing += a.saldoNeto; } });
                    erRows.push(['Total Ingresos', ing]);
                    erRows.push(['', '']);
                    erRows.push(['GASTOS', '']);
                    Object.values(ledger).forEach(a => { if(a.type === 'Gasto' && a.saldoNeto > 0) { erRows.push([a.name, a.saldoNeto]); gas += a.saldoNeto; } });
                    erRows.push(['Total Gastos', gas]);
                    erRows.push(['', '']);
                    const util = ing - gas;
                    erRows.push([util >= 0 ? 'Utilidad Neta' : 'Pérdida Neta', util]);
                    
                    // Balance General
                    const bgRows = [['BALANCE GENERAL', ''], ['Concepto', 'Monto']];
                    let act = 0, pas = 0, cap = 0;
                    bgRows.push(['ACTIVO', '']);
                    Object.values(ledger).forEach(a => { if(a.type === 'Activo' && a.saldoNeto > 0) { bgRows.push([a.name, a.saldoNeto]); act += a.saldoNeto; } });
                    bgRows.push(['Total Activo', act]);
                    bgRows.push(['', '']);
                    
                    bgRows.push(['PASIVO', '']);
                    Object.values(ledger).forEach(a => { if(a.type === 'Pasivo' && a.saldoNeto > 0) { bgRows.push([a.name, a.saldoNeto]); pas += a.saldoNeto; } });
                    bgRows.push(['Total Pasivo', pas]);
                    bgRows.push(['', '']);
                    
                    bgRows.push(['CAPITAL CONTABLE', '']);
                    Object.values(ledger).forEach(a => { if(a.type === 'Capital' && a.saldoNeto > 0) { bgRows.push([a.name, a.saldoNeto]); cap += a.saldoNeto; } });
                    bgRows.push([util >= 0 ? 'Resultado del Ejercicio' : 'Pérdida del Ejercicio', util]);
                    bgRows.push(['Total Capital', cap + util]);
                    bgRows.push(['', '']);
                    bgRows.push(['Suma Pasivo + Capital', pas + cap + util]);

                    worksheets.push({ name: 'Resultados', rows: erRows });
                    worksheets.push({ name: 'Balance', rows: bgRows });
                }

                const xmlString = generateExcelXML(worksheets);
                downloadXML(xmlString, filename);
                showToast(`Descargando ${filename} listo para Excel`, 'success');
            },

            navigate: (viewName) => {
                state.view = viewName;
                
                // Update UI Title
                document.getElementById('view-title').innerText = views[viewName].title;
                document.getElementById('view-subtitle').innerText = views[viewName].subtitle;
                
                // Update active nav button
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('hover:bg-slate-800');
                });
                const activeBtn = document.getElementById(`nav-${viewName}`);
                if (activeBtn) {
                    activeBtn.classList.add('bg-blue-600', 'text-white');
                    activeBtn.classList.remove('hover:bg-slate-800');
                }

                // Render Content
                contentDiv.innerHTML = views[viewName].render();
                
                // Mantener valores de input si regresamos a la vista de diario
                if(viewName === 'diario') {
                    const dDate = document.getElementById('draft-date');
                    const dConcept = document.getElementById('draft-concept');
                    if(dDate) dDate.value = state.draftEntry.date;
                    if(dConcept) dConcept.value = state.draftEntry.concept;
                    
                    // Listener para guardar concepto on blur
                    dConcept?.addEventListener('input', (e) => state.draftEntry.concept = e.target.value);
                    dDate?.addEventListener('input', (e) => state.draftEntry.date = e.target.value);
                }
            },

            // Acciones Catálogo
            addAccount: () => {
                const id = document.getElementById('new-acc-id').value.trim();
                const name = document.getElementById('new-acc-name').value.trim();
                const type = document.getElementById('new-acc-type').value;

                if (!id || !name) {
                    showToast('Por favor ingrese código y nombre de la cuenta.', 'error');
                    return;
                }
                if (state.accounts.some(a => a.id === id)) {
                    showToast('Ya existe una cuenta con ese código.', 'error');
                    return;
                }

                state.accounts.push({ id, name, type });
                // Ordenar por ID para mantener limpieza visual
                state.accounts.sort((a, b) => a.id.localeCompare(b.id));
                
                showToast(`Cuenta ${id} agregada exitosamente.`, 'success');
                app.navigate('catalogo'); // Re-render
            },

            // Acciones Diario
            addDraftLine: () => {
                const accId = document.getElementById('draft-acc').value;
                const debeInput = parseFloat(document.getElementById('draft-debe').value);
                const haberInput = parseFloat(document.getElementById('draft-haber').value);

                const debe = isNaN(debeInput) ? 0 : debeInput;
                const haber = isNaN(haberInput) ? 0 : haberInput;

                if (!accId) {
                    showToast('Seleccione una cuenta contable.', 'error');
                    return;
                }
                if (debe === 0 && haber === 0) {
                    showToast('Ingrese un valor mayor a cero en Debe o Haber.', 'error');
                    return;
                }
                if (debe > 0 && haber > 0) {
                    showToast('Una partida solo puede ir al Debe o al Haber, no a ambos.', 'error');
                    return;
                }

                state.draftEntry.lines.push({ accountId: accId, debe, haber });
                app.navigate('diario'); // Re-render draft table
            },

            removeDraftLine: (index) => {
                state.draftEntry.lines.splice(index, 1);
                app.navigate('diario');
            },

            saveJournalEntry: () => {
                if (state.draftEntry.lines.length < 2) {
                    showToast('Un asiento debe tener al menos dos partidas.', 'error');
                    return;
                }
                if (!state.draftEntry.concept) {
                    showToast('Agregue un concepto/descripción al asiento.', 'error');
                    document.getElementById('draft-concept').focus();
                    return;
                }

                const sumDebe = state.draftEntry.lines.reduce((s, l) => s + l.debe, 0);
                const sumHaber = state.draftEntry.lines.reduce((s, l) => s + l.haber, 0);
                
                // Tolerancia muy pequeña por errores de punto flotante de JS
                if (Math.abs(sumDebe - sumHaber) > 0.001) {
                    showToast('El asiento no cumple la partida doble (Debe ≠ Haber).', 'error');
                    return;
                }

                // Guardar al historial
                const newId = state.journal.length > 0 ? Math.max(...state.journal.map(e => e.id)) + 1 : 1;
                state.journal.push({
                    id: newId,
                    date: state.draftEntry.date || new Date().toISOString().split('T')[0],
                    concept: state.draftEntry.concept,
                    lines: [...state.draftEntry.lines] // Clone array
                });

                showToast(`Asiento Nº ${newId} guardado. Balanza actualizada.`, 'success');

                // Limpiar borrador
                state.draftEntry.concept = '';
                state.draftEntry.lines = [];
                
                app.navigate('diario');
            }
        };

        // --- 6. INICIALIZACIÓN ---
        window.onload = () => {
            // Ordenar cuentas iniciales
            state.accounts.sort((a, b) => a.id.localeCompare(b.id));
            app.navigate('diario'); // Vista inicial
        };

    </script>
</body>
</html>
